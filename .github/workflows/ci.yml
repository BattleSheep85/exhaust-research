name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build check
        uses: cloudflare/wrangler-action@v3
        with:
          command: deploy --dry-run --outdir=dist
        env:
          ANTHROPIC_API_KEY: test-key-for-build
